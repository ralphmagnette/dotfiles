# ~/.config/tmux/tmux.conf

# Use Ctrl+a as prefix (instead of default Ctrl+b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Splits (two keys after prefix)
bind v split-window -h -c "#{pane_current_path}" \; select-pane -R
bind s split-window -v -c "#{pane_current_path}" \; select-pane -D

# Navigate panes (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# New window
bind c new-window -c "#{pane_current_path}"

# Kill pane/window without confirmation
bind x kill-pane
bind X kill-window

# Reset to clean workspace (1 window, 1 pane)
bind R kill-pane -a \; kill-window -a \; display "Workspace reset"

# Better mouse support
set -g mouse on

# Start windows/panes at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Enable mouse copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Faster key repeat
set -s escape-time 0

# Terminal emulator compatibility
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Status bar
set -g status-position bottom
set -g status-style bg='#1e1e2e',fg='#cdd6f4'
set -g status-left-length 40
set -g status-right-length 60
set -g status-left " #S "
set -g status-right " %H:%M %d-%b-%y "

# Window status
setw -g window-status-style fg='#cdd6f4',bg='#1e1e2e'
setw -g window-status-current-style fg='#1e1e2e',bg='#89b4fa'

# Active pane border
set -g pane-border-style fg='#45475a'
set -g pane-active-border-style fg='#89b4fa'

# theme
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'mocha'

# Message style
set -g message-style fg='#cdd6f4',bg='#313244'
